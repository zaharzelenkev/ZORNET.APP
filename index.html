<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORNET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:       #D4AF37;
            --gold-dark:  #B8860B;
            --gold-glow:  rgba(212,175,55,.14);
            --gold-glow2: rgba(212,175,55,.38);
            --bg:         #F7F8FA;
            --bg2:        #FFFFFF;
            --bg3:        #EEF0F4;
            --card:       #FFFFFF;
            --inp:        #FFFFFF;
            --text:       #18192A;
            --text2:      #4A5568;
            --text3:      #8896A7;
            --border:     #E4E8EF;
            --sh:         rgba(0,0,0,.06);
            --sh2:        rgba(0,0,0,.13);
            --hdr:        62px;
            --radius:     14px;
        }
        @media(prefers-color-scheme:dark){
            :root{
                --bg:#0E0E0E;--bg2:#161616;--bg3:#1E1E1E;
                --card:#181818;--inp:#202020;
                --text:#ECECEC;--text2:#A0A0A0;--text3:#555555;
                --border:#272727;--sh:rgba(0,0,0,.32);--sh2:rgba(0,0,0,.52);
            }
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{font-size:16px;height:100%}
        body{
            font-family:'Inter',sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;-webkit-font-smoothing:antialiased;
        }
        a{text-decoration:none;color:inherit}
        button{cursor:pointer;font-family:inherit;border:none;background:none}
        input,select{font-family:inherit}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:var(--bg2)}
        ::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

        /* ── ЛОГОТИП ── */
        .logo{
            font-family:'Playfair Display',serif;font-weight:900;
            letter-spacing:-1px;
            background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 55%,var(--gold) 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;display:inline-block;position:relative;
            user-select:none;
        }
        .logo::after{
            content:'Зроблена ў Беларусі';
            position:absolute;bottom:-18px;left:50%;
            transform:translateX(-50%) translateY(4px);
            font-family:'Inter',sans-serif;font-size:.55rem;font-weight:500;
            letter-spacing:.7px;color:var(--gold-dark);
            -webkit-text-fill-color:var(--gold-dark);
            background:none;-webkit-background-clip:initial;background-clip:initial;
            white-space:nowrap;opacity:0;transition:opacity .3s,transform .3s;
        }
        .logo:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}
        .logo-xl{font-size:3.8rem}
        .logo-sm{font-size:1.55rem;letter-spacing:-.5px;cursor:pointer}
        .logo-sm::after{font-size:.5rem;bottom:-13px}

        /* ── СТРОКА ПОИСКА ── */
        .sw{position:relative;width:100%}
        .si{
            width:100%;height:52px;padding:0 56px 0 22px;
            background:var(--inp);border:1.5px solid var(--border);
            border-radius:100px;font-size:.95rem;color:var(--text);
            outline:none;box-shadow:0 2px 14px var(--sh);
            transition:border-color .25s,box-shadow .25s;
        }
        .si:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow),0 4px 20px var(--sh2)}
        .si::placeholder{color:var(--text3)}
        .sb{
            position:absolute;right:5px;top:50%;transform:translateY(-50%);
            width:42px;height:42px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);
            display:flex;align-items:center;justify-content:center;
            transition:box-shadow .2s,transform .2s;
        }
        .sb:hover{box-shadow:0 3px 16px var(--gold-glow2);transform:translateY(-50%) scale(1.06)}
        .sb svg{stroke:#111;flex-shrink:0}
        .si-sm{height:44px;font-size:.88rem}
        .sb-sm{width:36px;height:36px}

        /* подсказки */
        .sug{
            position:absolute;top:calc(100% + 8px);left:0;right:0;
            background:var(--card);border:1px solid var(--border);
            border-radius:var(--radius);box-shadow:0 8px 32px var(--sh2);
            z-index:400;overflow:hidden;
        }
        .sug-row{
            display:flex;align-items:center;gap:10px;
            padding:10px 18px;font-size:.875rem;color:var(--text2);
            cursor:pointer;transition:background .15s;
        }
        .sug-row:hover{background:var(--bg3);color:var(--text)}
        .sug-ic{color:var(--text3);display:flex;align-items:center;flex-shrink:0}

        /* ── ГЛАВНАЯ ── */
        #pgHome{
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            min-height:100vh;padding:40px 20px;
        }
        .home-inner{
            display:flex;flex-direction:column;
            align-items:center;width:100%;max-width:620px;
        }
        .home-logo{margin-bottom:40px;text-align:center}

        /* ── ВИДЖЕТЫ ── */
        .wgts{
            display:grid;grid-template-columns:repeat(4,1fr);
            gap:10px;width:100%;margin-top:22px;
        }
        @media(max-width:580px){.wgts{grid-template-columns:repeat(2,1fr)}}
        .wgt{
            background:var(--card);border:1px solid var(--border);
            border-radius:var(--radius);padding:14px 10px;text-align:center;
            transition:border-color .25s,box-shadow .25s,transform .2s;
        }
        .wgt:hover{border-color:var(--gold);box-shadow:0 4px 20px var(--gold-glow);transform:translateY(-2px)}
        .wgt-ic{
            width:30px;height:30px;border-radius:8px;
            background:linear-gradient(135deg,var(--gold-glow),rgba(184,134,11,.07));
            border:1px solid rgba(212,175,55,.22);
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 9px;
        }
        .wgt-ic svg{stroke:var(--gold-dark)}
        .wgt-val{
            font-size:1.15rem;font-weight:700;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .wgt-lbl{font-size:.65rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:500}
        .wgt-sub{font-size:.6rem;color:var(--text3);margin-top:2px}
        .wgt-in{
            width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);
            border-radius:8px;font-size:.75rem;color:var(--text);outline:none;text-align:center;margin-bottom:5px;
        }
        .wgt-in:focus{border-color:var(--gold)}
        .city-row{display:flex;gap:4px;margin-top:7px}
        .city-in{
            flex:1;padding:5px 7px;background:var(--bg3);border:1px solid var(--border);
            border-radius:7px;font-size:.7rem;color:var(--text);outline:none;
        }
        .city-in:focus{border-color:var(--gold)}
        .city-go{
            padding:5px 9px;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            border-radius:7px;color:#111;font-size:.7rem;font-weight:700;
            display:flex;align-items:center;
        }
        .home-quick{width:100%;margin-top:14px}

        /* ── ШАПКА РЕЗУЛЬТАТОВ ── */
        #pgResults{display:none;flex-direction:column;min-height:100vh}
        .res-hdr{
            position:sticky;top:0;z-index:300;height:var(--hdr);
            background:color-mix(in srgb,var(--bg) 95%,transparent);
            backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
            border-bottom:1px solid var(--border);
            display:flex;align-items:center;padding:0 22px;gap:14px;
        }
        .hdr-s{flex:1;max-width:540px;position:relative}

        /* ── ФИЛЬТРЫ ── */
        .filters{
            display:flex;gap:6px;padding:13px 22px 0;
            max-width:1260px;margin:0 auto;width:100%;flex-wrap:wrap;
        }
        .ftab{
            display:flex;align-items:center;gap:5px;
            padding:6px 15px;border-radius:100px;
            border:1px solid var(--border);background:var(--card);
            color:var(--text2);font-size:.8rem;font-weight:500;
            transition:all .2s;
        }
        .ftab svg{stroke:currentColor}
        .ftab:hover{border-color:var(--gold);color:var(--gold-dark)}
        .ftab.active{
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            border-color:transparent;color:#111;
        }
        .ftab.active svg{stroke:#111}

        /* ── ОСНОВНОЙ ЛЕЙАУТ ── */
        .res-body{
            max-width:1260px;margin:0 auto;width:100%;
            padding:16px 22px 60px;
            display:grid;grid-template-columns:1fr 320px;gap:24px;
            align-items:start;
        }
        @media(max-width:940px){.res-body{grid-template-columns:1fr}.res-right{order:-1}}
        @media(max-width:560px){.res-body{padding:12px 12px 60px}.res-hdr{padding:0 12px}.filters{padding:10px 12px 0}}

        /* ── IFRAME ПОИСК ── */
        .search-frame-wrap{
            position:relative;width:100%;
            border-radius:var(--radius);overflow:hidden;
            border:1px solid var(--border);
            box-shadow:0 2px 16px var(--sh);
            background:var(--card);
            min-height:600px;
        }
        .search-frame{
            width:100%;height:100%;min-height:700px;
            border:none;display:block;
            background:var(--card);
        }
        .frame-loader{
            position:absolute;inset:0;
            background:var(--card);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:14px;z-index:10;
            transition:opacity .4s;
        }
        .frame-loader.hidden{opacity:0;pointer-events:none}
        .frame-loader p{font-size:.85rem;color:var(--text3)}

        /* ── QUICK ANSWER ── */
        .qcard{
            background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(184,134,11,.03));
            border:1px solid var(--gold);border-radius:var(--radius);
            padding:16px 18px;margin-bottom:16px;
            display:flex;align-items:center;gap:14px;
        }
        .qcard-ico{
            width:42px;height:42px;border-radius:11px;flex-shrink:0;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            display:flex;align-items:center;justify-content:center;
        }
        .qcard-ico svg{stroke:#111}
        .qcard-val{
            font-size:1.75rem;font-weight:800;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            line-height:1.1;
        }
        .qcard-lbl{font-size:.75rem;color:var(--text3);margin-top:2px}

        /* ── КОНВЕРТЕР ── */
        .conv-card{
            background:var(--card);border:1px solid var(--gold);
            border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;
        }
        .conv-title{
            font-size:.68rem;font-weight:700;color:var(--text3);
            text-transform:uppercase;letter-spacing:.6px;
            margin-bottom:11px;display:flex;align-items:center;gap:5px;
        }
        .conv-title svg{stroke:var(--gold-dark)}
        .conv-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
        .conv-in{
            flex:1;min-width:65px;padding:7px 10px;
            background:var(--bg3);border:1px solid var(--border);
            border-radius:9px;font-size:.88rem;color:var(--text);
            outline:none;text-align:center;
        }
        .conv-in:focus{border-color:var(--gold)}
        .conv-sel{
            padding:7px 9px;background:var(--bg3);
            border:1px solid var(--border);border-radius:9px;
            font-size:.82rem;color:var(--text);outline:none;
        }
        .conv-eq{font-size:.82rem;color:var(--text3);margin-top:9px}
        .conv-res{
            font-size:1.3rem;font-weight:800;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }

        /* ── ПАГИНАЦИЯ (для совместимости) ── */
        .pgn{
            display:flex;align-items:center;justify-content:center;
            gap:10px;margin-top:20px;padding-top:16px;
            border-top:1px solid var(--border);
        }
        .pg-btn{
            display:flex;align-items:center;gap:5px;
            padding:8px 18px;border-radius:100px;
            border:1px solid var(--border);background:var(--card);
            color:var(--text);font-size:.82rem;font-weight:500;transition:all .2s;
        }
        .pg-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold-dark)}
        .pg-btn:disabled{opacity:.3;cursor:default}

        /* ── AI ВИДЖЕТ ── */
        .ai-box{
            position:sticky;top:calc(var(--hdr) + 14px);
            border-radius:18px;overflow:hidden;
            border:1px solid var(--gold);box-shadow:0 4px 26px var(--gold-glow);
        }
        .ai-hdr{
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            padding:12px 15px;display:flex;align-items:center;gap:9px;
        }
        .ai-hdr-ico{
            width:28px;height:28px;border-radius:50%;
            background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;
        }
        .ai-hdr-ico svg{stroke:#111}
        .ai-hdr-name{font-size:.86rem;font-weight:700;color:#111;line-height:1.2}
        .ai-hdr-sub{font-size:.6rem;color:rgba(0,0,0,.5)}
        .ai-dot{
            width:7px;height:7px;border-radius:50%;
            background:rgba(0,0,0,.2);margin-left:auto;flex-shrink:0;transition:background .3s;
        }
        .ai-dot.on{background:#1a7c3e;animation:dpulse 1.2s infinite}
        @keyframes dpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
        .ai-chat{
            background:var(--card);min-height:130px;max-height:360px;
            overflow-y:auto;padding:13px 15px;
        }
        .ai-ph{
            display:flex;flex-direction:column;align-items:center;
            justify-content:center;padding:26px 12px;text-align:center;gap:9px;color:var(--text3);
        }
        .ai-ph-ico{
            width:38px;height:38px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold-glow),rgba(184,134,11,.06));
            border:1px solid rgba(212,175,55,.28);
            display:flex;align-items:center;justify-content:center;
        }
        .ai-ph-ico svg{stroke:var(--gold-dark)}
        .ai-ph p{font-size:.8rem;line-height:1.55}
        .ask-btn{
            display:inline-flex;align-items:center;gap:5px;
            padding:7px 16px;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            border-radius:100px;color:#111;font-size:.78rem;font-weight:700;
            transition:box-shadow .2s,transform .2s;
        }
        .ask-btn:hover{box-shadow:0 4px 14px var(--gold-glow2);transform:translateY(-1px)}
        .ask-btn svg{stroke:#111}
        .chat-msg{margin-bottom:9px;animation:fadeUp .25s ease}
        .chat-msg.usr{text-align:right}
        .bubble{
            display:inline-block;max-width:92%;padding:8px 12px;
            border-radius:13px;font-size:.8rem;line-height:1.65;text-align:left;
        }
        .bubble.usr{
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            color:#111;border-bottom-right-radius:3px;font-weight:500;
        }
        .bubble.ai{background:var(--bg3);color:var(--text2);border-bottom-left-radius:3px}
        .chat-meta{font-size:.62rem;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:3px}
        .chat-meta svg{stroke:var(--gold)}
        .ai-foot{
            padding:9px 13px;border-top:1px solid var(--border);
            background:var(--card);display:flex;gap:6px;
        }
        .ai-in{
            flex:1;padding:7px 13px;background:var(--bg3);
            border:1px solid var(--border);border-radius:100px;
            font-size:.8rem;color:var(--text);outline:none;transition:border-color .2s;
        }
        .ai-in:focus{border-color:var(--gold)}
        .ai-send{
            width:33px;height:33px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;
        }
        .ai-send:hover{box-shadow:0 3px 12px var(--gold-glow2);transform:scale(1.07)}
        .ai-send svg{stroke:#111}
        .scur::after{content:'▋';animation:blink .7s infinite;color:var(--gold);font-size:.85em}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

        /* ── FAB + SHEET ── */
        .ai-fab{
            position:fixed;bottom:22px;right:22px;
            width:52px;height:52px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            box-shadow:0 4px 22px var(--gold-glow2);
            display:none;align-items:center;justify-content:center;z-index:400;transition:transform .2s;
        }
        .ai-fab svg{stroke:#111}
        .ai-fab:hover{transform:scale(1.08)}
        @media(max-width:940px){.ai-fab{display:flex}}
        .sh-ov{
            position:fixed;inset:0;background:rgba(0,0,0,.45);
            z-index:490;opacity:0;pointer-events:none;transition:opacity .3s;
        }
        .sh-ov.show{opacity:1;pointer-events:all}
        .ai-sheet{
            position:fixed;bottom:0;left:0;right:0;background:var(--card);
            border-top:2px solid var(--gold);border-radius:20px 20px 0 0;
            z-index:500;transform:translateY(100%);
            transition:transform .36s cubic-bezier(.4,0,.2,1);
            max-height:72vh;display:flex;flex-direction:column;
        }
        .ai-sheet.open{transform:translateY(0)}
        .sh-handle{
            width:36px;height:4px;background:var(--border);
            border-radius:2px;margin:10px auto 5px;cursor:pointer;
        }

        /* ── МИНИ-ВИДЖЕТЫ (боковая панель) ── */
        .side-wgts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
        .swgt{
            background:var(--card);border:1px solid var(--border);
            border-radius:13px;padding:11px 9px;text-align:center;transition:border-color .2s;
        }
        .swgt:hover{border-color:var(--gold)}
        .swgt-ic{
            width:24px;height:24px;border-radius:6px;
            background:linear-gradient(135deg,var(--gold-glow),rgba(184,134,11,.06));
            border:1px solid rgba(212,175,55,.18);
            display:flex;align-items:center;justify-content:center;margin:0 auto 6px;
        }
        .swgt-ic svg{stroke:var(--gold-dark)}
        .swgt-val{
            font-size:.95rem;font-weight:700;
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .swgt-lbl{font-size:.58rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

        /* ── СПИННЕР ── */
        .spin{
            display:inline-block;width:20px;height:20px;
            border:2.5px solid var(--border);border-top-color:var(--gold);
            border-radius:50%;animation:sp .7s linear infinite;
        }
        .spin.lg{width:34px;height:34px;border-width:3px}
        @keyframes sp{to{transform:rotate(360deg)}}

        /* ── ТОСТЫ ── */
        #toasts{
            position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
            z-index:9999;display:flex;flex-direction:column;align-items:center;
            gap:7px;pointer-events:none;
        }
        .toast{
            background:var(--card);border:1px solid var(--border);border-radius:11px;
            padding:9px 16px;font-size:.83rem;color:var(--text);
            box-shadow:0 6px 26px var(--sh2);display:flex;align-items:center;gap:8px;
            animation:tin .28s ease;pointer-events:all;white-space:nowrap;
        }
        .toast.ok{border-left:3px solid #22c55e}
        .toast.err{border-left:3px solid #ef4444}
        .toast.inf{border-left:3px solid var(--gold)}
        @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        @keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(6px)}}

        /* ── АНИМАЦИИ ── */
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .hidden{display:none!important}

        /* ── КНОПКИ ПОИСКОВИКА ── */
        .engine-tabs{
            display:flex;gap:5px;margin-top:11px;flex-wrap:wrap;justify-content:center;
        }
        .etab{
            display:flex;align-items:center;gap:4px;
            padding:5px 13px;border-radius:100px;
            border:1px solid var(--border);background:var(--card);
            color:var(--text2);font-size:.75rem;font-weight:500;transition:all .2s;
        }
        .etab svg{stroke:currentColor;flex-shrink:0}
        .etab:hover{border-color:var(--gold);color:var(--gold-dark)}
        .etab.active{
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            border-color:transparent;color:#111;
        }
        .etab.active svg{stroke:#111}

        /* ── IFRAME КОНТЕЙНЕР ── */
        .iframe-container{
            width:100%;position:relative;
            border-radius:var(--radius);overflow:hidden;

/* ================================================================
   ЗАГРУЗКА IFRAME
   ================================================================ */
function loadFrame() {
    const frame  = document.getElementById('searchFrame');
    const cover  = document.getElementById('frameCover');
    const msg    = document.getElementById('frameMsg');
    const pgn    = document.getElementById('pgn');

    // Показываем лоадер
    cover.classList.remove('gone');
    frame.classList.remove('loaded');
    if (msg) msg.textContent = `Ищем «${S.q}» в ${ENGINES[S.engine].name}...`;

    // Zero-click блоки
    renderQuickBlock(zeroClick(S.q));
    renderConvBlock(parseConv(S.q));

    // Формируем URL
    const eng = ENGINES[S.engine];
    const filterFn = eng[S.filter] || eng.web;
    const url = filterFn(encodeURIComponent(S.q));

    // Устанавливаем src фрейма
    frame.src = url;

    // Таймаут — если фрейм не загрузится (CORS блок)
    // Показываем кнопку "Открыть в новой вкладке"
    const timeout = setTimeout(() => {
        cover.classList.remove('gone');
        if (msg) msg.textContent = 'Если результаты не видны — откройте в новой вкладке';
        pgn.style.display = 'flex';
    }, 6000);

    frame._openUrl = url;
    frame._timeout = timeout;
}

function frameLoaded() {
    const frame = document.getElementById('searchFrame');
    const cover = document.getElementById('frameCover');
    clearTimeout(frame._timeout);

    // Пробуем определить — загрузился контент или заблокирован
    try {
        // Если доступ есть — скрываем лоадер
        const title = frame.contentDocument?.title;
        cover.classList.add('gone');
        frame.classList.add('loaded');

        // Авто-высота фрейма
        try {
            const h = frame.contentDocument?.body?.scrollHeight;
            if (h && h > 400) frame.style.minHeight = h + 'px';
        } catch(_) {}

    } catch(e) {
        // Cross-origin — значит страница загрузилась (просто не можем читать)
        // Это нормально — контент всё равно отображается
        cover.classList.add('gone');
        frame.classList.add('loaded');
    }
}

function frameError() {
    const cover = document.getElementById('frameCover');
    const msg   = document.getElementById('frameMsg');
    const pgn   = document.getElementById('pgn');
    cover.classList.remove('gone');
    if (msg) msg.textContent = 'Не удалось загрузить результаты';
    pgn.style.display = 'flex';
}

function openExternal() {
    const frame = document.getElementById('searchFrame');
    if (frame._openUrl) window.open(frame._openUrl, '_blank');
}

/* ================================================================
   ZERO-CLICK БЫСТРЫЕ ОТВЕТЫ
   ================================================================ */
function zeroClick(q) {
    const c = tryCalc(q);
    if (c !== null) return { type:'calc', val: fmtN(c), lbl:`Результат: ${q}` };
    const t = tryTemp(q);
    if (t) return { type:'temp', val: t.res, lbl: t.lbl };
    return null;
}

function tryCalc(q) {
    let e = q.trim().replace(/\s/g,'').replace(/[xX×]/g,'*').replace(/÷/g,'/').replace(/²/g,'**2').replace(/³/g,'**3');
    if (!/[\+\-\*\/\^()]/.test(e)) return null;
    if (!/^[\d\.\+\-\*\/\(\)\^eE]+$/.test(e)) return null;
    try {
        const r = Function(`"use strict";return(${e})`)();
        if (typeof r === 'number' && isFinite(r)) return Math.round(r * 1e7) / 1e7;
    } catch(_) {}
    return null;
}

function tryTemp(q) {
    const cF = q.match(/(-?\d+(?:\.\d+)?)\s*(?:°?c|celsius|цельс\w*)\s*(?:в|to)\s*(?:°?f|fahrenheit|фаренг\w*)/i);
    if (cF) { const c=+cF[1],f=c*9/5+32; return { res:`${f.toFixed(1)}°F`, lbl:`${c}°C → Fahrenheit` }; }
    const fC = q.match(/(-?\d+(?:\.\d+)?)\s*(?:°?f|fahrenheit|фаренг\w*)\s*(?:в|to)\s*(?:°?c|celsius|цельс\w*)/i);
    if (fC) { const f=+fC[1],c=(f-32)*5/9; return { res:`${c.toFixed(1)}°C`, lbl:`${f}°F → Celsius` }; }
    return null;
}

const QSVG = {
    calc: '<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="14" y1="16" x2="18" y2="16"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="12" y1="14" x2="12" y2="18"/>',

/* ================================================================
   КОНВЕРТЕР ВАЛЮТ
   ================================================================ */
function parseConv(q) {
    const m = q.match(/^(\d+(?:\.\d+)?)\s*(usd|eur|byn|rub|uah|pln|доллар\w*|евро|рубл\w*|гривн\w*|злот\w*)\s*(?:в|to)\s*(usd|eur|byn|rub|uah|pln|доллар\w*|евро|рубл\w*|гривн\w*|злот\w*)/i);
    if (!m) return null;
    return { amount: +m[1], from: normC(m[2]), to: normC(m[3]) };
}
function normC(s) {
    s = s.toLowerCase();
    if (/usd|доллар/.test(s)) return 'USD';
    if (/eur|евро/.test(s))   return 'EUR';
    if (/byn|рубл|рубел/.test(s)) return 'BYN';
    if (/rub|российск/.test(s))   return 'RUB';
    if (/uah|гривн/.test(s))      return 'UAH';
    if (/pln|злот/.test(s))       return 'PLN';
    return s.toUpperCase();
}
function cOpts(sel) {
    return ['USD','EUR','BYN','RUB','UAH','PLN','GBP','CNY']
        .map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');
}
async function renderConvBlock(cv) {
    const el = document.getElementById('convBlock');
    if (!cv) { el.innerHTML=''; return; }
    el.innerHTML = `<div class="conv-card">
        <div class="conv-title">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            Конвертер валют
        </div>
        <div class="conv-row">
            <input type="number" class="conv-in" id="cvA" value="${cv.amount}" oninput="recalcC()">
            <select class="conv-sel" id="cvF" onchange="recalcC()">${cOpts(cv.from)}</select>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <select class="conv-sel" id="cvT" onchange="recalcC()">${cOpts(cv.to)}</select>
        </div>
        <div class="conv-eq">
            <span style="color:var(--text2);font-size:.82rem">${cv.amount} ${cv.from} = </span>
            <span class="conv-res" id="cvR">…</span>
        </div>
        <div style="font-size:.63rem;color:var(--text3);margin-top:3px" id="cvRI">НБРБ</div>
    </div>`;
    await recalcC();
}
async function recalcC() {
    const a=g('cvA'),f=g('cvF'),t=g('cvT'),r=g('cvR'),ri=g('cvRI');
    if (!a) return;
    if (!Object.keys(S.rates).length) await loadRates();
    const amt=+a.value||0, fr=f.value, to=t.value;
    const frR=S.rates[fr]||(fr==='BYN'?1:null);
    const toR=S.rates[to]||(to==='BYN'?1:null);
    if (!frR||!toR) { if(r) r.textContent='—'; return; }
    const res=(amt*frR)/toR;
    if (r) r.textContent=`${fmtN(Math.round(res*10000)/10000)} ${to}`;
    if (ri) ri.textContent=`1 ${fr} = ${fmtN(Math.round(frR/toR*10000)/10000)} ${to} · НБРБ`;
}

/* ================================================================
   GROQ AI — РЕАЛЬНЫЙ API
   ================================================================ */
async function askGroq(mode='d') {
    if (!S.q) { toast('Сначала выполните поиск', 'inf'); return; }
    const msg = `Кратко и структурированно ответь на запрос: "${S.q}". Ключевые факты, практическая польза. Отвечай по-русски, используй Markdown.`;
    await callGroq(msg, mode);
}
async function sendAI(mode='d') {

    const el = g(id);
    const msg = el?.value?.trim();
    if (!msg) return;
    el.value = '';
    await callGroq(msg, mode);
}

async function callGroq(userMsg, mode='d') {
    if (S.busy) return;
    if (!CFG.GROQ_KEY || CFG.GROQ_KEY.startsWith('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')) {
        toast('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', 'err', 5000);
        return;
    }
    S.busy = true;
    setDot(true);
    const hist = mode==='m' ? S.chatM : S.chatD;
    hist.push({ role:'user', content: userMsg });
    renderChat(mode);
    const aiMsg = { role:'assistant', content:'', streaming:true };
    hist.push(aiMsg);
    renderChat(mode, true);

    const messages = [
        { role:'system', content:'Ты — ИИ-ассистент поисковой системы ZORNET. Отвечай кратко, структурированно, используй Markdown.' },
        ...hist.slice(-12,-1).map(m=>({ role:m.role, content:m.content })),
        { role:'user', content: userMsg }
    ];

    try {
        const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method:'POST',
            headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${CFG.GROQ_KEY}` },
            body:JSON.stringify({ model:CFG.GROQ_MODEL, messages, stream:true, temperature:.6, max_tokens:1200 })
        });
        if (!resp.ok) {
            const e = await resp.json().catch(()=>({}));
            const m = e?.error?.message || `HTTP ${resp.status}`;
            if (resp.status===401) throw new Error('Неверный Groq API Key.');
            if (resp.status===429) throw new Error('Превышен лимит Groq. Подождите.');
            throw new Error(m);
        }
        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let full='', buf='';
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += dec.decode(value,{stream:true});
            const lines = buf.split('\n');
            buf = lines.pop()||'';
            for (const line of lines) {
                const t = line.trim();
                if (!t.startsWith('data: ')) continue;
                const raw = t.slice(6);
                if (raw==='[DONE]') break;
                try {
                    const chunk = JSON.parse(raw);
                    const delta = chunk?.choices?.[0]?.delta?.content;
                    if (delta) { full+=delta; aiMsg.content=full; updBubble(full,mode); }
                } catch(_) {}
            }
        }
        aiMsg.content=full; aiMsg.streaming=false;
        renderChat(mode); setDot(false);
    } catch(e) {
        console.error('[ZORNET Groq]',e);
        hist.pop();
        hist.push({ role:'assistant', content:`Ошибка: ${e.message}`, err:true });
        renderChat(mode); setDot(false);
        toast(e.message,'err',5000);
    } finally { S.busy=false; }
}

function renderChat(mode, streaming=false) {
    const bodyId = mode==='m' ? 'aiChatM' : 'aiChat';
    const phId   = mode==='m' ? 'aiPHM'   : 'aiPH';
    const body   = g(bodyId);
    const hist   = mode==='m' ? S.chatM   : S.chatD;
    if (!body) return;
    if (!hist.length) {
        body.innerHTML = `<div class="ai-ph" id="${phId}">
            <div class="ai-ph-ico"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
            <p>Задайте вопрос или нажмите кнопку — ИИ проанализирует ваш запрос</p>
            <button class="ask-btn" onclick="askGroq('${mode}')">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Спросить у ИИ
            </button>
        </div>`;
        return;
    }
    body.innerHTML = hist.map(m => {
        if (m.role==='user') return `<div class="chat-msg usr"><div class="bubble usr">${esc(m.content)}</div></div>`;
        const cls = m.streaming ? 'ai sb' : 'ai';
        const cnt = m.err
            ? `<span style="color:#ef4444">${esc(m.content)}</span>`
            : fmtAI(m.content)+(m.streaming?'':'');
        return `<div class="chat-msg">
            <div class="chat-meta">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                ZORNET AI
                ${m.streaming?'<span class="spin" style="width:8px;height:8px;border-width:1.5px;margin-left:3px"></span>':''}
            </div>
            <div class="bubble ${cls}">${cnt}</div>
        </div>`;
    }).join('');
    body.scrollTop = body.scrollHeight;
}

function updBubble(text, mode) {
    const body = g(mode==='m'?'aiChatM':'aiChat');
    if (!body) return;
    const b = body.querySelector('.sb');
    if (b) { b.innerHTML=fmtAI(text); b.classList.add('scur'); body.scrollTop=body.scrollHeight; }
}

function fmtAI(t) {
    if (!t) return '';
    return t
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.*?)\*/g,'<em>$1</em>')
        .replace(/`([^`]+)`/g,'<code style="background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:.78em;font-family:monospace">$1</code>')
        .replace(/^#{3}\s(.+)$/gm,'<strong style="display:block;color:var(--text);margin:6px 0 2px;font-size:.86rem">$1</strong>')
        .replace(/^#{2}\s(.+)$/gm,'<strong style="display:block;color:var(--text);margin:8px 0 3px;font-size:.9rem">$1</strong>')
        .replace(/^[-•]\s(.+)$/gm,'<div style="display:flex;gap:5px;margin:2px 0"><span style="color:var(--gold);flex-shrink:0">•</span><span>$1</span></div>')
        .replace(/^(\d+)\.\s(.+)$/gm,'<div style="display:flex;gap:5px;margin:2px 0"><span style="color:var(--gold);font-weight:700;flex-shrink:0">$1.</span><span>$2</span></div>')
        .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

/* ================================================================
   ПОГОДА — Open-Meteo (бесплатно, без ключа)
   ================================================================ */
async function loadWeather(lat=53.9006,lon=27.559,city='Минск') {
    setW('—',city);
    try {
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=auto&forecast_days=1`);
        if(!r.ok) throw new Error();
        const d=await r.json();
        const cur=d?.current;
        if(!cur) throw new Error();
        const temp=Math.round(cur.temperature_2m);
        setW(`${temp}°C`,`${city} · ${wmoD(cur.weathercode)}`);
        localStorage.setItem('z_wlat',lat);
        localStorage.setItem('z_wlon',lon);
        localStorage.setItem('z_wcity',city);
    } catch(_){ setW('—','Недоступно'); }
}
function setW(temp,city) {
    setT('wTemp',temp);setT('wCity',city);
    setT('swTemp',temp);setT('swCity',city.split(' · ')[0]);
}
function wmoD(c) {
    if(c===0) return 'Ясно';if(c<=2) return 'Облачно';if(c===3) return 'Пасмурно';
    if(c<=49) return 'Туман';if(c<=59) return 'Морось';if(c<=69) return 'Дождь';
    if(c<=79) return 'Снег';if(c<=82) return 'Ливень';if(c>=95) return 'Гроза';
    return 'Облачно';
}
function initWeather() {
    const lat=localStorage.getItem('z_wlat');
    const lon=localStorage.getItem('z_wlon');
    const city=localStorage.getItem('z_wcity');
    if(lat&&lon){loadWeather(+lat,+lon,city);return;}
    loadWeather();
    if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>loadWeather(p.coords.latitude,p.coords.longitude,'Ваше местоположение'),()=>{});
}
function refreshWeather() {
    const lat=localStorage.getItem('z_wlat');
    const lon=localStorage.getItem('z_wlon');
    const city=localStorage.getItem('z_wcity');
    loadWeather(lat?+lat:53.9006,lon?+lon:27.559,city||'Минск');
}
async function lookupCity() {
    const el=g('cityIn');const v=el?.value?.trim();if(!v) return;
    setW('…',v);
    try {
        const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=1&language=ru&format=json`);
        const d=await r.json();
        if(!d?.results?.length){toast(`Город «${v}» не найден`,'err');setW('—','Не найдено');return;}
        const res=d.results[0];
        await loadWeather(res.latitude,res.longitude,res.name);
        if(el) el.value='';
        toast(`Погода для ${res.name} загружена`,'ok');
    } catch(_){toast('Ошибка поиска города','err');}
}

/* ================================================================
   КУРСЫ ВАЛЮТ — НБРБ (бесплатно, без ключа)
   ================================================================ */
async function loadRates() {
    try {
        const r=await fetch('https://api.nbrb.by/exrates/rates?periodicity=0');
        if(!r.ok) throw new Error();
        const data=await r.json();
        S.rates={BYN:1};
        data.forEach(x=>{S.rates[x.Cur_Abbreviation]=x.Cur_OfficialRate/x.Cur_Scale;});
        const usd=S.rates['USD']?.toFixed(4);
        const eur=S.rates['EUR']?.toFixed(4);
        const dt=new Date().toLocaleDateString('ru-BY',{day:'2-digit',month:'2-digit'});
        setT('wUsd',usd||'—');setT('wEur',eur||'—');
        setT('swUsd',S.rates['USD']?.toFixed(2)||'—');
        setT('wUsdD',`НБРБ · ${dt}`);setT('wEurD',`НБРБ · ${dt}`);
    } catch(_){setT('wUsd','—');setT('wEur','—');setT('swUsd','—');}
}

/* ================================================================
   КАЛЬКУЛЯТОР
   ================================================================ */
function calcW() {
    const v=g('calcIn')?.value;
    if(!v?.trim()){setT('calcOut','—');return;}
    const r=tryCalc(v.trim());
    setT('calcOut',r!==null?fmtN(r):'?');
}

/* ================================================================
   УТИЛИТЫ
   ================================================================ */
function g(id){return document.getElementById(id)}
function setT(id,val){const e=g(id);if(e)e.textContent=val}
function esc(t){if(!t)return'';const d=document.createElement('div');d.appendChild(document.createTextNode(String(t)));return d.innerHTML}
function fmtN(n){if(n===null||n===undefined)return'—';return new Intl.NumberFormat('ru-BY').format(n)}
function toast(msg,type='inf',dur=3000){
    const c=g('toasts');if(!c)return;
    const icons={ok:'✓',err:'✕',inf:'i'};
    const el=document.createElement('div');
    el.className=`toast ${type}`;
    el.innerHTML=`<span style="font-weight:700">${icons[type]||'i'}</span><span>${esc(msg)}</span>`;
    c.appendChild(el);
    setTimeout(()=>{el.style.animation='tout .3s ease forwards';setTimeout(()=>el.remove(),300);},dur);
}
document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeSheet();
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){
        e.preventDefault();
        const isRes=g('pgResults').style.display==='flex';
        g(isRes?'resQ':'homeQ').focus();
    }
});
</script>
